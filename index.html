<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>MRIDU BOOK STUDIO</title>
  <link rel="manifest" href="manifest.json">
  <!-- PWA icons (only 192x192 and 512x512) -->
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon/icon-512.png">
  <style>
    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --font-family: 'Noto Sans', 'Noto Sans Devanagari', 'Noto Sans Gujarati', sans-serif;
      --font-size-base: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      background: var(--color-bg);
      color: var(--color-text);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #app-root {
      display: none;
      width: 100%;
      height: 100%;
    }

    #loading-root,
    #overlay-root,
    #dialog-root,
    #toast-root,
    #portal-root {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 1000;
    }

    #loading-root {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg);
      z-index: 9999;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <div id="loading-root" aria-live="polite">Loading...</div>
  <div id="overlay-root"></div>
  <div id="dialog-root"></div>
  <div id="toast-root"></div>
  <div id="portal-root"></div>

  <!-- Remove any lingering Service Worker immediately -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>

  <script>
    /**
     * BOOT CONFIGURATION URL – overridable via global variable.
     */
    const BOOT_CONFIG_URL = window.MRIDU_BOOT_URL || 'boot.json';

    /**
     * Default boot configuration — used if boot.json fails.
     */
    const DEFAULT_BOOT = {
      core: [
        'core/event-bus.js',
        'core/utils/id.js',
        'core/utils/object.js',
        'core/constants.js',
        'core/storage.js',
        'core/state-manager.js',
        'core/bootstrap.js'
      ],
      modules: []
    };

    /**
     * Generic asset loader – JS and CSS.
     */
    function loadAssets(paths) {
      return paths.reduce((promise, path) => {
        return promise.then(() => {
          return new Promise((resolve, reject) => {
            const ext = path.split('.').pop().toLowerCase();
            if (ext === 'js') {
              const script = document.createElement('script');
              script.src = path;
              script.onload = resolve;
              script.onerror = () => reject(new Error('Failed to load script: ' + path));
              document.head.appendChild(script);
            } else if (ext === 'css') {
              const link = document.createElement('link');
              link.rel = 'stylesheet';
              link.href = path;
              link.onload = resolve;
              link.onerror = () => reject(new Error('Failed to load stylesheet: ' + path));
              document.head.appendChild(link);
            } else {
              reject(new Error('Unsupported asset type: ' + path));
            }
          });
        });
      }, Promise.resolve());
    }

    /**
     * Boot sequence – loads assets, then hands over to bootstrap.js.
     */
    (function boot() {
      fetch(BOOT_CONFIG_URL)
        .then(response => response.ok ? response.json() : Promise.reject())
        .catch(() => {
          console.warn('Boot config not available, using default.');
          return DEFAULT_BOOT;
        })
        .then(config => {
          return loadAssets([...config.core, ...config.modules]);
        })
        .catch(err => {
          const loading = document.getElementById('loading-root');
          loading.style.display = 'flex';
          loading.textContent = 'Unable to start. Please check your connection and reload.';
          console.error('Boot error:', err);
        });
    })();
  </script>
</body>
</html>
